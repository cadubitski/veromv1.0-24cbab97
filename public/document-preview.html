<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="doc-title">Documento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 12pt;
      line-height: 1.7;
      color: #111;
      background: #f5f5f5;
    }
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a1a2e;
      color: #eee;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .toolbar-title { flex: 1; font-size: 14px; font-weight: 600; }
    .btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4f8ef7; color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #eee; }
    .page-wrapper {
      margin-top: 52px;
      padding: 40px 24px;
      display: flex;
      justify-content: center;
    }
    .page {
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      padding: 25mm 20mm;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      border-radius: 4px;
    }
    /* Markdown styles */
    h1 { font-size: 18pt; margin-bottom: 16px; margin-top: 24px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    h2 { font-size: 14pt; margin-bottom: 12px; margin-top: 20px; }
    h3 { font-size: 12pt; margin-bottom: 10px; margin-top: 16px; }
    p { margin-bottom: 12px; text-align: justify; }
    strong { font-weight: 700; }
    em { font-style: italic; }
    ul, ol { margin-left: 24px; margin-bottom: 12px; }
    li { margin-bottom: 4px; }
    hr { border: none; border-top: 1px solid #ccc; margin: 20px 0; }
    code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; font-family: monospace; font-size: 10pt; }
    blockquote { border-left: 3px solid #aaa; padding-left: 12px; color: #555; margin: 12px 0; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #f0f0f0; font-weight: 600; }
    .unresolved { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 3px; padding: 1px 4px; font-family: monospace; font-size: 10pt; }
    @media print {
      .toolbar { display: none !important; }
      .page-wrapper { margin-top: 0; padding: 0; }
      .page { box-shadow: none; border-radius: 0; width: 100%; min-height: auto; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title" id="toolbar-title">Carregando...</span>
    <button class="btn btn-ghost" onclick="window.close()">✕ Fechar</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  </div>
  <div class="page-wrapper">
    <div class="page" id="doc-content">
      <p style="color:#999; text-align:center;">Carregando documento...</p>
    </div>
  </div>
  <script>
    // Receive data from opener
    window.addEventListener('message', (event) => {
      const { title, html } = event.data;
      if (title) {
        document.getElementById('doc-title').textContent = title;
        document.getElementById('toolbar-title').textContent = title;
      }
      if (html) {
        document.getElementById('doc-content').innerHTML = html;
      }
    });
    // Signal ready
    if (window.opener) {
      window.opener.postMessage({ type: 'ready' }, '*');
    }
  </script>
</body>
</html>
